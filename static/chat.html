<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能客服助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .chat-input-container {
            padding: 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            resize: none;
            max-height: 100px;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }
        .message {
    margin-bottom: 16px;
    display: flex;
    align-items: flex-start;
    animation: slideIn 0.3s ease;
}

.message-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
}

.message.user {
    flex-direction: row-reverse;
}

.message.user .message-avatar {
    margin-left: 8px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.message.assistant .message-avatar {
    margin-right: 8px;
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
}

.message-content-wrapper {
    display: flex;
    flex-direction: column;
}

/* 用户消息的气泡和名字靠右 */
.message.user .message-content-wrapper {
    align-items: flex-end;
}

/* 客服消息的气泡和名字靠左 */
.message.assistant .message-content-wrapper {
    align-items: flex-start;
}

.message-name {
    font-size: 12px;
    color: #999;
    margin-bottom: 4px;
}

.message.user .message-name {
    text-align: right;
}

.message.assistant .message-name {
    text-align: left;
}

        #sendButton {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendButton:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #sendButton:active {
            transform: scale(0.95);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            max-width: 70px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .typing-indicator.show {
            display: block;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .quick-reply {
            padding: 8px 16px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 智能客服助手</h1>
            <p>24小时在线为您服务</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-content">
                    您好！我是智能客服助手，很高兴为您服务。请问有什么可以帮助您的吗？
                </div>
            </div>
        </div>

        <div class="quick-replies" id="quickReplies">
            <div class="quick-reply" onclick="sendQuickReply('产品使用问题')">产品使用问题</div>
            <div class="quick-reply" onclick="sendQuickReply('退换货申请')">退换货申请</div>
            <div class="quick-reply" onclick="sendQuickReply('订单查询')">订单查询</div>
            <div class="quick-reply" onclick="sendQuickReply('转人工客服')">转人工客服</div>
        </div>

        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <textarea id="messageInput" placeholder="输入消息..." rows="1" onkeypress="handleKeyPress(event)"></textarea>
                <button id="sendButton" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13"></path>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api/chat';
        let chatHistory = [];
        let isTyping = false;

        // 自动调整文本框高度
        const messageInput = document.getElementById('messageInput');
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function sendQuickReply(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
            // 隐藏快捷回复
            document.getElementById('quickReplies').style.display = 'none';
        }

        async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    
    if (!message || isTyping) return;
    
    // 标记正在等待
    isTyping = true;
    document.getElementById('sendButton').disabled = true;
    
    // 清空输入框
    input.value = '';
    input.style.height = 'auto';
    
    // 添加用户消息
    addMessage(message, 'user');
    chatHistory.push({ role: 'user', content: message });
    
    // 隐藏快捷回复
    document.getElementById('quickReplies').style.display = 'none';
    
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                message: message,
                history: chatHistory.slice(-6)
            })
        });
        
        const data = await response.json();
        
        if (data.reply) {
            chatHistory.push({ role: 'assistant', content: data.reply });
            
            // 计算延迟时间（模拟真人打字）
            const baseDelay = 1000 + Math.random() * 1000; // 1-2秒基础延迟
            const typingDelay = data.reply.length * 40; // 每字40ms
            const totalDelay = Math.min(baseDelay + typingDelay, 8000); // 最多8秒
            
            // 等待后直接显示回复
            setTimeout(() => {
                addMessage(data.reply, 'assistant');
                isTyping = false;
                document.getElementById('sendButton').disabled = false;
            }, totalDelay);
        } else {
            throw new Error('响应格式错误');
        }
    } catch (error) {
        console.error('Error:', error);
        addMessage('抱歉，我遇到了一些问题，请稍后再试。', 'assistant', true);
        isTyping = false;
        document.getElementById('sendButton').disabled = false;
    }
}

        function addMessage(text, sender, isError = false) {
    const messagesContainer = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${sender}`;
    
    // 头像
    const avatarDiv = document.createElement('div');
    avatarDiv.className = 'message-avatar';
    if (sender === 'user') {
        avatarDiv.textContent = '👤';
    } else {
        // 客服头像（可以用emoji或图片）
        avatarDiv.innerHTML = '<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=customer-service" style="width:100%;height:100%;border-radius:50%;">';
    }
    
    // 消息容器（名字+气泡）
    const wrapperDiv = document.createElement('div');
    wrapperDiv.className = 'message-content-wrapper';
    
    // 名字
    const nameDiv = document.createElement('div');
    nameDiv.className = 'message-name';
    nameDiv.textContent = sender === 'user' ? '我' : '客服小美';
    
    // 气泡
    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    
    if (isError) {
        contentDiv.style.background = '#ffebee';
        contentDiv.style.color = '#c62828';
    }
    
    contentDiv.textContent = text;
    
    wrapperDiv.appendChild(nameDiv);
    wrapperDiv.appendChild(contentDiv);
    messageDiv.appendChild(avatarDiv);
    messageDiv.appendChild(wrapperDiv);
    messagesContainer.appendChild(messageDiv);
    
    // 滚动到底部
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

        function showTypingIndicator() {
            isTyping = true;
            document.getElementById('sendButton').disabled = true;
            
            const messagesContainer = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-indicator show">
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            isTyping = false;
            document.getElementById('sendButton').disabled = false;
            
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        // 页面加载时聚焦输入框
        window.onload = function() {
            document.getElementById('messageInput').focus();
        };
    </script>
</body>
</html>
