<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; }
        .sidebar { width: 220px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 24px 0; display: flex; flex-direction: column; box-shadow: 2px 0 20px rgba(0, 0, 0, 0.1); }
        .sidebar-header { padding: 0 24px 24px; border-bottom: 1px solid rgba(102, 126, 234, 0.2); margin-bottom: 16px; }
        .sidebar-header h1 { font-size: 18px; color: #333; font-weight: 600; }
        .sidebar-header p { font-size: 12px; color: #666; margin-top: 4px; }
        .nav-item { display: flex; align-items: center; padding: 14px 24px; color: #666; text-decoration: none; transition: all 0.2s; cursor: pointer; }
        .nav-item:hover { background: rgba(102, 126, 234, 0.1); color: #667eea; }
        .nav-item.active { background: rgba(102, 126, 234, 0.15); color: #667eea; border-left: 3px solid #667eea; }
        .nav-item svg { width: 20px; height: 20px; margin-right: 12px; }
        .main-content { flex: 1; padding: 32px; overflow-y: auto; }
        .content-card { background: white; border-radius: 16px; padding: 28px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15); margin-bottom: 24px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-title { font-size: 24px; color: #333; font-weight: 600; }
        .page-subtitle { font-size: 14px; color: #666; margin-top: 4px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #f5f5f5; color: #666; }
        .btn-secondary:hover { background: #e8e8e8; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-danger:hover { background: #ff3344; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .search-bar { display: flex; gap: 12px; margin-bottom: 20px; }
        .search-input { flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: #667eea; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #666; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { color: #333; font-size: 14px; }
        tr:hover { background: #f8f9fa; }
        .category-tag { display: inline-block; padding: 4px 10px; background: rgba(102, 126, 234, 0.1); color: #667eea; border-radius: 20px; font-size: 12px; }
        .action-btns { display: flex; gap: 8px; }
        .action-btn { padding: 6px 12px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .edit-btn { background: #e3f2fd; color: #1976d2; }
        .edit-btn:hover { background: #bbdefb; }
        .delete-btn { background: #ffebee; color: #d32f2f; }
        .delete-btn:hover { background: #ffcdd2; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 24px; }
        .page-btn { width: 36px; height: 36px; border: 1px solid #e0e0e0; background: white; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .page-btn:hover { border-color: #667eea; color: #667eea; }
        .page-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 16px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
        .modal-header { padding: 24px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 18px; color: #333; font-weight: 600; }
        .modal-close { width: 32px; height: 32px; border: none; background: #f5f5f5; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .modal-close:hover { background: #e0e0e0; }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 20px 24px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 12px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: #333; font-size: 14px; font-weight: 500; }
        .form-label .required { color: #ff4757; margin-left: 4px; }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: #667eea; }
        .form-textarea { min-height: 120px; resize: vertical; }
        .form-hint { font-size: 12px; color: #999; margin-top: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); }
        .stat-value { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-label { font-size: 14px; color: #666; margin-top: 4px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state svg { width: 80px; height: 80px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { font-size: 18px; color: #666; margin-bottom: 8px; }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; border-radius: 8px; color: white; font-size: 14px; z-index: 2000; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #2ed573; }
        .toast.error { background: #ff4757; }
        .confirm-text { text-align: center; padding: 20px 0; font-size: 16px; color: #333; }
        .confirm-text strong { color: #ff4757; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 16px 0; }
            .sidebar-header, .nav-item span { display: none; }
            .nav-item { justify-content: center; padding: 14px; }
            .nav-item svg { margin-right: 0; }
            .main-content { padding: 16px; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 16px; }
            .search-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header"><h1>管理后台</h1><p>智能客服系统</p></div>
        <a href="/chat.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>聊天页面</span></a>
        <div class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span>知识库管理</span></div>
    </nav>
    <main class="main-content">
        <div class="stats-grid"><div class="stat-card"><div class="stat-value" id="totalCount">-</div><div class="stat-label">知识条目总数</div></div><div class="stat-card"><div class="stat-value" id="currentPage">1</div><div class="stat-label">当前页码</div></div></div>
        <div class="content-card">
            <div class="page-header"><div><h2 class="page-title">知识库列表</h2><p class="page-subtitle">管理您的知识库内容</p></div><button class="btn btn-primary" onclick="openAddModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>添加知识</button></div>
            <div class="search-bar"><input type="text" class="search-input" id="searchKeyword" placeholder="搜索标题、内容或关键词..." onkeypress="handleSearchKeypress(event)"><button class="btn btn-primary" onclick="searchKnowledge()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>搜索</button></div>
            <div class="table-container"><table><thead><tr><th style="width: 50px;">ID</th><th>标题</th><th>分类</th><th>内容</th><th>关键词</th><th>更新时间</th><th style="width: 150px;">操作</th></tr></thead><tbody id="knowledgeTable"><tr><td colspan="6" class="loading"><div class="spinner"></div>加载中...</td></tr></tbody></table></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </main>
    <div class="modal-overlay" id="formModal">
        <div class="modal">
            <div class="modal-header"><h3 class="modal-title" id="modalTitle">添加知识</h3><button class="modal-close" onclick="closeModal('formModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
            <div class="modal-body"><form id="knowledgeForm"><input type="hidden" id="knowledgeId"><div class="form-group"><label class="form-label">标题<span class="required">*</span></label><input type="text" class="form-input" id="knowledgeTitle" required placeholder="请输入知识标题"></div><div class="form-group"><label class="form-label">分类<span class="required">*</span></label><select class="form-select" id="knowledgeCategory" required><option value="">请选择分类</option><option value="产品使用">产品使用</option><option value="退换货">退换货</option><option value="常见问题">常见问题</option><option value="售后服务">售后服务</option><option value="其他">其他</option></select></div><div class="form-group"><label class="form-label">内容<span class="required">*</span></label><textarea class="form-textarea" id="knowledgeContent" required placeholder="请输入知识内容"></textarea></div><div class="form-group"><label class="form-label">关键词</label><input type="text" class="form-input" id="knowledgeKeywords" placeholder="多个关键词用逗号分隔"><p class="form-hint">多个关键词请用逗号分隔，如：密码,重置,找回</p></div></form></div>
            <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('formModal')">取消</button><button class="btn btn-primary" onclick="submitForm()">保存</button></div>
        </div>
    </div>
    <div class="modal-overlay" id="deleteModal">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-header"><h3 class="modal-title">确认删除</h3><button class="modal-close" onclick="closeModal('deleteModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
            <div class="modal-body"><p class="confirm-text">确定要删除知识「<strong id="deleteTitle"></strong>」吗？<br>此操作不可撤销。</p></div>
            <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('deleteModal')">取消</button><button class="btn btn-danger" onclick="confirmDelete()">删除</button></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const API_BASE = window.location.origin;
        let currentPage = 1, pageSize = 10, currentKeyword = '', totalPages = 1, deleteId = null;
        document.addEventListener('DOMContentLoaded', () => { loadKnowledge(); });
        async function loadKnowledge() {
            try {
                const params = new URLSearchParams({ page: currentPage, page_size: pageSize, keyword: currentKeyword });
                const response = await fetch(`${API_BASE}/api/knowledge?${params}`);
                const data = await response.json();
                document.getElementById('totalCount').textContent = data.total;
                document.getElementById('currentPage').textContent = data.page;
                const tbody = document.getElementById('knowledgeTable');
                if (data.items.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><h3>暂无知识条目</h3><p>点击上方按钮添加第一条知识</p></div></td></tr>';
                } else {
                    tbody.innerHTML = data.items.map(item => `
    <tr>
        <td>${item.id}</td>
        <td title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</td>
        <td><span class="category-tag">${escapeHtml(item.category)}</span></td>
        <td title="${escapeHtml(item.content)}" style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(item.content).length > 50 ? escapeHtml(item.content).substring(0, 50) + '...' : escapeHtml(item.content)}</td>
        <td title="${escapeHtml(item.keywords)}">${escapeHtml(item.keywords) || '-'}</td>
        <td>${formatDate(item.updated_at)}</td>
        <td>
            <div class="action-btns">
                <button class="action-btn edit-btn" onclick="openEditModal(${item.id})">编辑</button>
                <button class="action-btn delete-btn" onclick="openDeleteModal(${item.id}, '${escapeHtml(item.title)}')">删除</button>
            </div>
        </td>
    </tr>
`).join('');
                }
                totalPages = data.total_pages;
                renderPagination();
            } catch (error) { console.error('加载失败:', error); showToast('加载失败，请刷新重试', 'error'); }
        }
        function searchKnowledge() { currentKeyword = document.getElementById('searchKeyword').value.trim(); currentPage = 1; loadKnowledge(); }
        function handleSearchKeypress(event) { if (event.key === 'Enter') { searchKnowledge(); } }
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>`;
            const maxVisible = 5;
            let start = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let end = Math.min(totalPages, start + maxVisible - 1);
            if (end - start + 1 < maxVisible) { start = Math.max(1, end - maxVisible + 1); }
            if (start > 1) { html += `<button class="page-btn" onclick="goToPage(1)">1</button>`; if (start > 2) { html += `<span style="padding: 0 8px;">...</span>`; } }
            for (let i = start; i <= end; i++) { html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`; }
            if (end < totalPages) { if (end < totalPages - 1) { html += `<span style="padding: 0 8px;">...</span>`; } html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`; }
            html += `<button class="page-btn" ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>`;
            pagination.innerHTML = html;
        }
        function goToPage(page) { if (page < 1 || page > totalPages) return; currentPage = page; loadKnowledge(); }
        function openAddModal() { document.getElementById('modalTitle').textContent = '添加知识'; document.getElementById('knowledgeForm').reset(); document.getElementById('knowledgeId').value = ''; document.getElementById('formModal').classList.add('show'); }
        async function openEditModal(id) {
            try {
                const response = await fetch(`${API_BASE}/api/knowledge/${id}`);
                if (!response.ok) throw new Error('获取失败');
                const item = await response.json();
                document.getElementById('modalTitle').textContent = '编辑知识';
                document.getElementById('knowledgeId').value = item.id;
                document.getElementById('knowledgeTitle').value = item.title;
                document.getElementById('knowledgeCategory').value = item.category;
                document.getElementById('knowledgeContent').value = item.content;
                document.getElementById('knowledgeKeywords').value = item.keywords || '';
                document.getElementById('formModal').classList.add('show');
            } catch (error) { console.error('获取详情失败:', error); showToast('获取详情失败', 'error'); }
        }
        async function submitForm() {
            const id = document.getElementById('knowledgeId').value;
            const title = document.getElementById('knowledgeTitle').value.trim();
            const category = document.getElementById('knowledgeCategory').value;
            const content = document.getElementById('knowledgeContent').value.trim();
            const keywords = document.getElementById('knowledgeKeywords').value.trim();
            if (!title || !category || !content) { showToast('请填写必填项', 'error'); return; }
            const data = { title, category, content, keywords };
            try {
                const url = id ? `${API_BASE}/api/knowledge/${id}` : `${API_BASE}/api/knowledge`;
                const method = id ? 'PUT' : 'POST';
                const response = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (!response.ok) throw new Error('保存失败');
                showToast(id ? '更新成功' : '添加成功', 'success');
                closeModal('formModal');
                loadKnowledge();
            } catch (error) { console.error('保存失败:', error); showToast('保存失败，请重试', 'error'); }
        }
        function openDeleteModal(id, title) { deleteId = id; document.getElementById('deleteTitle').textContent = title; document.getElementById('deleteModal').classList.add('show'); }
        async function confirmDelete() {
            if (!deleteId) return;
            try {
                const response = await fetch(`${API_BASE}/api/knowledge/${deleteId}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('删除失败');
                showToast('删除成功', 'success');
                closeModal('deleteModal');
                loadKnowledge();
            } catch (error) { console.error('删除失败:', error); showToast('删除失败，请重试', 'error'); }
        }
        function closeModal(modalId) { document.getElementById(modalId).classList.remove('show'); }
        function showToast(message, type = 'success') { const toast = document.getElementById('toast'); toast.textContent = message; toast.className = `toast ${type} show`; setTimeout(() => { toast.classList.remove('show'); }, 3000); }
        function formatDate(dateStr) { if (!dateStr) return '-'; const date = new Date(dateStr); return date.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }); }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        document.querySelectorAll('.modal-overlay').forEach(overlay => { overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.classList.remove('show'); } }); });
    </script>
</body>
</html>
